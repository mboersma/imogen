# Image-builder run as a Kubernetes Job on the CAPZ builder cluster.
#
# This replaces the standalone Azure Container Instances build. The pod runs the
# image-builder container, which logs in with the build managed identity exposed
# on the builder VMSS through IMDS (no stored secret), then runs the
# build-azure-sig-<flavor> make target. Packer creates a temporary VM and
# resource group and publishes the image version to the staging gallery.
#
# Before the build, the pod tags Packer's azure_tags with an imogen-build marker
# (jq patch) so the temporary resource group can be garbage-collected safely if a
# hard failure leaks it; Packer still cleans it up itself on success or a graceful
# failure.
#
# hack/run-build-job.sh fills in the placeholders and applies this to the builder
# cluster.
apiVersion: batch/v1
kind: Job
metadata:
  name: __NAME__
  namespace: default
  labels:
    app: imogen-build
    imogen.build/flavor: __FLAVOR__
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: imogen-build
      annotations:
        # A build runs a real Packer VM for tens of minutes; never let the
        # autoscaler evict the node out from under it.
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: image-builder
          image: __IMAGE__
          command:
            - /bin/bash
            - -c
            - |
              set -e
              az login --identity --client-id "$AZURE_CLIENT_ID"
              export USE_AZURE_CLI_AUTH=True
              # Tag the temporary Packer resource group so a leaked one (when a
              # hard failure kills the pod before Packer cleans up) can be safely
              # garbage-collected by hack/gc-build-rgs.sh without touching other
              # tenants' Packer groups in this shared subscription.
              if [ -n "$IMOGEN_BUILD_TAG" ] && [ -f packer/azure/packer.json ]; then
                jq --arg t "$IMOGEN_BUILD_TAG" --arg ts "$IMOGEN_BUILD_TS" \
                  '.builders |= map(if .azure_tags then .azure_tags += {"imogen-build":$t,"imogen-build-ts":$ts} else . end)' \
                  packer/azure/packer.json > /tmp/packer.json
                mv /tmp/packer.json packer/azure/packer.json
              fi
              make __TARGET__
          env:
            - name: AZURE_SUBSCRIPTION_ID
              value: "__SUBSCRIPTION_ID__"
            - name: AZURE_LOCATION
              value: "__LOCATION__"
            - name: AZURE_CLIENT_ID
              value: "__CLIENT_ID__"
            - name: RESOURCE_GROUP_NAME
              value: "__RESOURCE_GROUP__"
            - name: GALLERY_NAME
              value: "__GALLERY__"
            - name: PACKER_FLAGS
              value: "__PACKER_FLAGS__"
            - name: IMOGEN_BUILD_TAG
              value: "__BUILD_TAG__"
            - name: IMOGEN_BUILD_TS
              value: "__BUILD_TS__"
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
