# Windows kube-proxy for the builder workload cluster, run as a HostProcess
# DaemonSet. Applied (with __KUBERNETES_VERSION__ substituted) and torn down by
# hack/validate-image.sh per Windows validation, because the kube-proxy image is
# version-specific and the builder validates several minors. Mirrors CAPZ
# templates/addons/windows/calico/kube-proxy-windows.yaml. Uses the kube-proxy
# ServiceAccount and ConfigMap that kubeadm creates on the control plane.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: kube-proxy
  name: kube-proxy-windows
  namespace: kube-system
spec:
  selector:
    matchLabels:
      k8s-app: kube-proxy-windows
  template:
    metadata:
      labels:
        k8s-app: kube-proxy-windows
    spec:
      serviceAccountName: kube-proxy
      securityContext:
        windowsOptions:
          hostProcess: true
          runAsUserName: "NT AUTHORITY\\system"
      hostNetwork: true
      priorityClassName: system-node-critical
      containers:
      - image: sigwindowstools/kube-proxy:__KUBERNETES_VERSION__-calico-hostprocess
        args: ["$env:CONTAINER_SANDBOX_MOUNT_POINT/kube-proxy/start.ps1"]
        workingDir: "$env:CONTAINER_SANDBOX_MOUNT_POINT/kube-proxy/"
        name: kube-proxy
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KUBEPROXY_PATH
          valueFrom:
            configMapKeyRef:
              name: windows-kubeproxy-ci
              key: KUBEPROXY_PATH
              optional: true
        volumeMounts:
        - mountPath: /var/lib/kube-proxy
          name: kube-proxy
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - operator: Exists
      volumes:
      - configMap:
          name: kube-proxy
        name: kube-proxy
  updateStrategy:
    type: RollingUpdate
