apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: imogen-aoai
  namespace: kagent
spec:
  provider: AzureOpenAI
  model: gpt-4.1-mini
  apiKeySecret: imogen-aoai-key
  apiKeySecretKey: AZUREOPENAI_API_KEY
  # This subscription disallows API-key (local) auth on Azure OpenAI, and this
  # kagent version's Azure client only sends a static header, so the account can
  # only be reached with a short-lived (~74m) Entra token. Rather than carry that
  # token here (where kagent folds it into the agent's config-hash, so rotating
  # it rolls the agent and kills in-flight runs, and letting it go stale 401s
  # mid-run), on AKS azureEndpoint points at the imogen-aoai-proxy Service, which
  # holds the workload identity and injects a fresh token per request. The
  # api-key below is an unused placeholder the proxy strips. Local kind runs
  # (hack/setup-kagent.sh) instead set azureEndpoint to the real account and
  # patch in an Entra token directly, since there is no workload identity there.
  azureOpenAI:
    azureEndpoint: __AOAI_ENDPOINT__
    azureDeployment: gpt-4.1-mini
    apiVersion: "2024-10-21"
