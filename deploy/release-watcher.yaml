# Release watcher: a scheduled trigger that asks the imogen agent to reconcile
# the community gallery against upstream Kubernetes releases. It runs the thin
# hack/reconcile.sh, which posts a reconcile prompt to the agent's A2A endpoint
# and follows the task to completion, resubscribing if the stream drops during a
# long build. The agent does the gap analysis and drives build -> validate ->
# promote with its own tools. Promotion runs unattended here
# (IMOGEN_RECONCILE_AUTO_PROMOTE=1); retirement still needs a human.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: imogen-release-watcher
  namespace: kagent
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 14700
      template:
        metadata:
          labels:
            app: imogen-release-watcher
        spec:
          restartPolicy: Never
          containers:
            - name: reconcile
              image: __TOOLSERVER_IMAGE__
              command: ["/app/hack/reconcile.sh"]
              env:
                - name: IMOGEN_AGENT_URL
                  value: "http://imogen.kagent.svc.cluster.local:8080/"
                - name: IMOGEN_RECONCILE_FLAVORS
                  value: "ubuntu-2404 ubuntu-2604 azurelinux-3 windows-2022-containerd windows-2025-containerd"
                - name: IMOGEN_RECONCILE_MINORS
                  value: "3"
                - name: IMOGEN_RECONCILE_MAX
                  value: "1"
                - name: IMOGEN_RECONCILE_AUTO_PROMOTE
                  value: "1"
                - name: IMOGEN_RECONCILE_TIMEOUT
                  value: "14400"
              resources:
                requests:
                  cpu: "50m"
                  memory: 64Mi
                limits:
                  cpu: "250m"
                  memory: 256Mi
