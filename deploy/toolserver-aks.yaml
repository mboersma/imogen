# In-cluster tool server for AKS, authenticated to Azure with workload identity.
#
# Unlike deploy/toolserver.yaml (the local kind variant), this runs the az and
# kubectl bundled image, runs as the imogen-toolserver service account federated
# to a user-assigned identity, and reads its Azure config from the imogen-config
# ConfigMap. hack/setup-kagent-aks.sh fills in the image and ConfigMap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imogen-toolserver
  namespace: kagent
  labels:
    app: imogen-toolserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imogen-toolserver
  template:
    metadata:
      labels:
        app: imogen-toolserver
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: imogen-toolserver
      containers:
        - name: toolserver
          image: __TOOLSERVER_IMAGE__
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: imogen-config
          env:
            - name: IMOGEN_TOOLSERVER_ADDR
              value: ":8080"
            - name: IMOGEN_IN_CLUSTER
              value: "1"
            # Optional Slack/Teams webhook for the notify tool. When the
            # imogen-notify Secret is absent, notify falls back to log-only.
            - name: IMOGEN_NOTIFY_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: imogen-notify
                  key: webhook-url
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: imogen-toolserver
  namespace: kagent
  labels:
    app: imogen-toolserver
spec:
  selector:
    app: imogen-toolserver
  ports:
    - name: http
      port: 8080
      targetPort: http
